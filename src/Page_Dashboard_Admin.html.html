<div class="container-fluid pssms-page" id="adminDashboardRoot">

  <div class="pssms-page-header">
    <div>
      <h4><i class="fas fa-tachometer-alt me-2" style="color:var(--p-accent);"></i>ระบบบริหารจัดการ</h4>
      <p class="pssms-subtitle" id="adminDashSubtitle">กำลังโหลด...</p>
    </div>
    <div class="pssms-actions">
      <button class="btn btn-soft btn-sm" onclick="initAdminDashboard()"><i class="fas fa-sync me-1"></i>รีเฟรช</button>
    </div>
  </div>

  <!-- KPI Strip -->
  <div class="row g-3 mb-3">
    <div class="col-6 col-md-3">
      <div class="pssms-card p-3 h-100" id="adminKpiStudentCard" onclick="_showTodayStudentDetail()" style="cursor:pointer;">
        <div class="small text-muted mb-1"><i class="fas fa-flag me-1"></i>นักเรียนเข้าแถววันนี้</div>
        <div class="fw-bold fs-3" style="color:var(--p-accent);" id="adminKpiStudents">
          <div class="pssms-skel" style="height:32px;width:80px;border-radius:6px;"></div>
        </div>
        <div class="small text-muted" id="adminKpiStudentsSub">คลิกดูรายชั้น →</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="pssms-card p-3 h-100">
        <div class="small text-muted mb-1"><i class="fas fa-users me-1"></i>บุคลากรมาวันนี้</div>
        <div class="fw-bold fs-3" style="color:var(--p-accent);" id="adminKpiStaff">
          <div class="pssms-skel" style="height:32px;width:60px;border-radius:6px;"></div>
        </div>
        <div class="small text-muted" id="adminKpiStaffSub">บุคลากรทั้งหมด</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="pssms-card p-3 h-100" id="adminKpiLeaveCard" onclick="loadPage('Page_Leave_Admin')" style="cursor:pointer;">
        <div class="small text-muted mb-1"><i class="fas fa-calendar-minus me-1"></i>ลารอพิจารณา</div>
        <div class="fw-bold fs-3" id="adminKpiLeave">
          <div class="pssms-skel" style="height:32px;width:50px;border-radius:6px;"></div>
        </div>
        <div class="small text-muted">คลิกเพื่อจัดการ →</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="pssms-card p-3 h-100" id="adminKpiSubCard" onclick="loadPage('Page_Substitute_Admin')" style="cursor:pointer;">
        <div class="small text-muted mb-1"><i class="fas fa-user-friends me-1"></i>สอนแทนรอจัด</div>
        <div class="fw-bold fs-3" id="adminKpiSub">
          <div class="pssms-skel" style="height:32px;width:50px;border-radius:6px;"></div>
        </div>
        <div class="small text-muted">คลิกเพื่อจัดการ →</div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="row g-3 mb-3">
    <div class="col-4">
      <button class="btn btn-soft w-100 py-3" onclick="loadPage('Page_Leave_Admin')">
        <i class="fas fa-calendar-minus d-block mb-1" style="font-size:1.3rem;"></i>
        <span class="small fw-medium">จัดการใบลา</span>
      </button>
    </div>
    <div class="col-4">
      <button class="btn btn-soft w-100 py-3" onclick="loadPage('Page_Substitute_Admin')">
        <i class="fas fa-user-friends d-block mb-1" style="font-size:1.3rem;"></i>
        <span class="small fw-medium">สอนแทน</span>
      </button>
    </div>
    <div class="col-4">
      <button class="btn btn-soft w-100 py-3" onclick="loadPage('Page_General')">
        <i class="fas fa-file-alt d-block mb-1" style="font-size:1.3rem;"></i>
        <span class="small fw-medium">งานสารบรรณ</span>
      </button>
    </div>
  </div>

  <!-- Bottom row: ปฏิทิน (left 60%) + ใบลารอ (right 40%) -->
  <div class="row g-3">
    <div class="col-12 col-lg-7">
      <div class="pssms-card h-100">
        <div class="pssms-card-header"><span><i class="fas fa-calendar-day me-2" style="color:var(--p-text-muted);"></i>กิจกรรมที่กำลังจะมาถึง</span></div>
        <div id="adminCalendarStrip" class="p-2">
          <div class="pssms-skel" style="height:44px;border-radius:8px;margin-bottom:6px;"></div>
          <div class="pssms-skel" style="height:44px;border-radius:8px;margin-bottom:6px;"></div>
          <div class="pssms-skel" style="height:44px;border-radius:8px;"></div>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-5">
      <div class="pssms-card h-100">
        <div class="pssms-card-header d-flex justify-content-between align-items-center">
          <span><i class="fas fa-calendar-minus me-2" style="color:var(--p-text-muted);"></i>ใบลารอพิจารณา</span>
          <button class="btn btn-soft btn-sm" onclick="loadPage('Page_Leave_Admin')">ดูทั้งหมด</button>
        </div>
        <div id="adminPendingLeaveList" class="p-2">
          <div class="pssms-skel" style="height:48px;border-radius:8px;margin-bottom:6px;"></div>
          <div class="pssms-skel" style="height:48px;border-radius:8px;"></div>
        </div>
      </div>
    </div>
  </div>

</div>
