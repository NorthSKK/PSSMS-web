<div class="container-fluid pssms-page pssms-dept-academic">
  <div class="pssms-page-header">
    <div>
      <h4><i class="fas fa-cogs me-2" style="color: var(--p-accent);"></i>ตั้งค่าโครงสร้างวิชา</h4>
      <p class="pssms-subtitle">กำหนดสัดส่วนคะแนน + ตัวชี้วัด/ชิ้นงาน ประจำรายวิชา (ปพ.5)</p>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="pssms-card h-100">
        <div class="pssms-card-header"><span><i class="fas fa-book me-2" style="color: var(--p-text-muted);"></i>1. เลือกรายวิชา</span></div>

        <label class="form-label small fw-medium text-muted">ภาคเรียน/ปีการศึกษา</label>
        <div class="input-group mb-3">
          <input type="text" id="configTerm" class="form-control text-center" readonly>
          <span class="input-group-text" style="background: var(--p-subtle);">/</span>
          <input type="text" id="configYear" class="form-control text-center" readonly>
        </div>

        <label class="form-label small fw-medium text-muted">รายวิชา</label>
        <select id="configClassSelect" class="form-select" onchange="loadSubjectConfig()">
          <option value="">⏳ กำลังโหลดวิชา...</option>
        </select>

        <div id="configSubjectInfo" class="mt-3 d-none">
          <div class="p-3 rounded-3" style="background: var(--p-subtle); border: 1px solid var(--p-border);">
            <div class="small text-muted mb-1" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em;">กำลังตั้งค่าสำหรับ</div>
            <div class="fw-semibold" id="dispConfigSubject" style="color: var(--p-text);"></div>
            <span class="pssms-chip mt-1 d-inline-block" id="dispConfigClass"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="pssms-card h-100 opacity-50" id="configPanel" style="pointer-events: none;">
        <div class="pssms-card-header">
          <span><i class="fas fa-balance-scale me-2" style="color: var(--p-text-muted);"></i>2. โครงสร้างคะแนน</span>
          <span class="pssms-chip">รวม <span id="totalScoreBadge" class="fw-bold" style="color: var(--p-accent);">0</span> / 100</span>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <label class="form-label small fw-medium text-muted">รวมคะแนนเก็บ</label>
            <input type="number" id="scoreFormative" class="form-control text-center" value="0" readonly style="background: var(--p-subtle);">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-medium text-muted">สอบกลางภาค</label>
            <input type="number" id="scoreMidterm" class="form-control text-center" value="0" onkeyup="calculateTotalConfigScore()">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-medium text-muted">สอบปลายภาค</label>
            <input type="number" id="scoreFinal" class="form-control text-center" value="0" onkeyup="calculateTotalConfigScore()">
          </div>
        </div>

        <div class="row g-2 mb-4">
          <div class="col-md-6">
            <div class="p-3 rounded-3" style="background: var(--p-subtle); border: 1px solid var(--p-border);">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-semibold" style="color: var(--p-text);"><i class="fas fa-file-alt me-1" style="color: var(--p-text-muted);"></i>ตัวชี้วัด กลางภาค</span>
                <select class="form-select form-select-sm w-50" style="font-size: 0.78rem;" id="selectMidtermInd" onchange="appendExamIndicator(this, 'midterm')">
                  <option value="">+ เลือกตัวชี้วัด...</option>
                </select>
              </div>
              <input type="text" id="midtermCode" class="form-control form-control-sm mb-1" placeholder="รหัสตัวชี้วัด (ถ้ามี)">
              <textarea id="midtermDesc" class="form-control form-control-sm" rows="2" placeholder="รายละเอียด/จุดประสงค์..."></textarea>
            </div>
          </div>
          <div class="col-md-6">
            <div class="p-3 rounded-3" style="background: var(--p-subtle); border: 1px solid var(--p-border);">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-semibold" style="color: var(--p-text);"><i class="fas fa-file-alt me-1" style="color: var(--p-text-muted);"></i>ตัวชี้วัด ปลายภาค</span>
                <select class="form-select form-select-sm w-50" style="font-size: 0.78rem;" id="selectFinalInd" onchange="appendExamIndicator(this, 'final')">
                  <option value="">+ เลือกตัวชี้วัด...</option>
                </select>
              </div>
              <input type="text" id="finalCode" class="form-control form-control-sm mb-1" placeholder="รหัสตัวชี้วัด (ถ้ามี)">
              <textarea id="finalDesc" class="form-control form-control-sm" rows="2" placeholder="รายละเอียด/จุดประสงค์..."></textarea>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap justify-content-between align-items-center mb-2 gap-2">
          <label class="form-label small fw-semibold m-0"><i class="fas fa-tasks me-1" style="color: var(--p-text-muted);"></i>รายละเอียดตัวชี้วัด / ชิ้นงาน (คะแนนเก็บ)</label>
          <div class="d-flex gap-2">
            <button class="btn btn-soft btn-sm" onclick="loadCurriculumToTable()" id="btnLoadCurriculum">
              <i class="fas fa-cloud-download-alt me-1"></i>ดึงจากหลักสูตร
            </button>
            <button class="btn btn-soft btn-sm" onclick="addIndicatorRow()">
              <i class="fas fa-plus me-1"></i>เพิ่มแถว
            </button>
          </div>
        </div>

        <div class="rounded-3 mb-3" style="border: 1px solid var(--p-border); overflow: hidden;">
          <table class="pssms-table mb-0">
            <thead>
              <tr>
                <th class="text-center" style="width: 50px;">#</th>
                <th style="width: 250px;">รหัส / ชื่อชิ้นงาน</th>
                <th>รายละเอียด / จุดประสงค์</th>
                <th class="text-center" style="width: 100px;">คะแนนเต็ม</th>
                <th class="text-center" style="width: 50px;">ลบ</th>
              </tr>
            </thead>
            <tbody id="indicatorTableBody"></tbody>
          </table>
        </div>

        <button class="btn btn-accent w-100 py-2 fw-medium" id="btnSaveConfig" onclick="saveSubjectConfigData()">
          <i class="fas fa-save me-2"></i>บันทึกโครงสร้างวิชา
        </button>
      </div>
    </div>
  </div>
</div>
