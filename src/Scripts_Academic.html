<script>
// ==========================================
// 1. ACADEMIC & ATTENDANCE LOGIC
// ==========================================
var sigCanvas, sigCtx, isDrawing = false;
var currentStudents = [];
let tempHistoryData = [];

function getRealClassName() {
  const classVal = document.getElementById('selectClass').value;
  if (!classVal) return "";
  return String(JSON.parse(classVal)[2]).trim(); 
}

function initAcademicPage() {
  const user = getSessionUser();
  if(!user) return;
  if(document.getElementById('academic-header-info')) document.getElementById('academic-header-info').innerText = `คุณครูผู้สอน: ${user.name} | ปีการศึกษา ${user.currentYear}`;
  
  const dateInput = document.getElementById('teachingDate');
  const pendingDate = sessionStorage.getItem('pending_teaching_date');
  if (pendingDate) {
      if(dateInput) dateInput.value = pendingDate;
      sessionStorage.removeItem('pending_teaching_date'); 
  } else if(dateInput && !dateInput.value) {
      const today = new Date();
      dateInput.value = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
  }
  updateThaiDateDisplay();
  reloadTimetableByDate();
  setTimeout(setupSignatureCanvas, 300);

  // 🌟 แอบดึงปุ่มระบบลับมาแสดงในหน้าหลัก
  setTimeout(() => {
      const cp = document.querySelector('#selectClass')?.closest('.card-body');
      if (cp && !document.getElementById('btnMassiveGrid')) {
          cp.insertAdjacentHTML('beforeend', `
            <hr class="text-muted opacity-25 my-3">
            <button id="btnMassiveGrid" class="btn btn-dark w-100 fw-bold shadow-sm animate__animated animate__fadeInUp" onclick="openMassiveGrid()" style="border: 2px dashed #dc3545;">
              <i class="fas fa-magic me-2 text-warning"></i>เช็คชื่อแบบตารางรวม (ทั้งเทอม)
            </button>
          `);
      }
  }, 800);
}

function updateThaiDateDisplay() {
  const dateVal = document.getElementById('teachingDate').value;
  const display = document.getElementById('thaiDateDisplay');
  if(display && dateVal) display.innerHTML = '<i class="fas fa-calendar-check me-2"></i>' + formatThaiDate(dateVal);
}

function reloadTimetableByDate(forceRefresh = false) {
  const user = getSessionUser();
  const dateInput = document.getElementById('teachingDate');
  const dateStr = dateInput ? dateInput.value : "";
  if(!user || !dateStr) { showLoader(false); return; }

  const cacheKey = `v2_timetable_${user.id}_${dateStr}`;
  if (!forceRefresh && sessionStorage.getItem(cacheKey)) { buildTimetableDropdown(JSON.parse(sessionStorage.getItem(cacheKey))); return; }

  showLoader(true);
  google.script.run
    .withFailureHandler(err => { showLoader(false); showAlert("Error: " + err.message); })
    .withSuccessHandler(function(timetable) {
      try { sessionStorage.setItem(cacheKey, JSON.stringify(timetable)); } catch(e){} 
      buildTimetableDropdown(timetable);
    }).getTeacherTimetableByDate(user.id, dateStr); 
}

function buildTimetableDropdown(timetable) {
  const select = document.getElementById('selectClass');
  if(!select) return;
  select.innerHTML = '<option value="">-- โปรดเลือกวิชาที่สอน --</option>';
  if(document.getElementById('studentRows')) document.getElementById('studentRows').innerHTML = ''; 
  document.getElementById('classInfoCard')?.classList.add('d-none');
  document.getElementById('studentListSection')?.classList.add('d-none');

  if(!timetable || timetable.length === 0) { select.innerHTML = '<option value="">ไม่มีตารางสอนในวันที่เลือก</option>'; showLoader(false); return; }

  timetable.sort((a, b) => Number(a[5]) - Number(b[5]));

  timetable.forEach(item => {
    let opt = document.createElement('option');
    opt.value = JSON.stringify(item);
    const _isClub = String(item[0]).indexOf('CLUB_') === 0;
    opt.text = _isClub
      ? `คาบ ${item[5]}: [ชุมนุม] ${item[1]}`
      : `คาบ ${item[5]}: ${item[0]} ${item[1]} (${String(item[2]).trim()})`;
    select.add(opt);
  });

  const pendingStr = sessionStorage.getItem('pending_attendance_item');
  if (pendingStr) {
     try {
         const pendingObj = JSON.parse(pendingStr);
         for(let i = 0; i < select.options.length; i++) {
             if(!select.options[i].value) continue;
             const optObj = JSON.parse(select.options[i].value);
             if(optObj[0] === pendingObj[0] && optObj[2] === pendingObj[2] && String(optObj[5]) === String(pendingObj[5])) {
                 select.selectedIndex = i; break;
             }
         }
     } catch(e) { console.error("Error parsing pending item:", e); }
     if (select.selectedIndex > 0) loadStudentList(); else showLoader(false); 
     sessionStorage.removeItem('pending_attendance_item');
  } else { showLoader(false); }
}

function autoSelectRoom() {
  const val = document.getElementById('selectClass').value;
  if(!val) return;
  const roomSelect = document.getElementById('selectRoom');
  if(roomSelect) roomSelect.value = String(JSON.parse(val)[3]).trim();
  loadStudentList(); 
}

function loadStudentList(forceRefresh = false) {
  const classVal = document.getElementById('selectClass').value;
  const btn = document.getElementById('btnSubmitAll');
  const dateInput = document.getElementById('teachingDate'); 

  if(!classVal) {
      if(btn) btn.disabled = true;
      document.getElementById('classInfoCard')?.classList.add('d-none');
      document.getElementById('studentListSection')?.classList.add('d-none');
      showLoader(false); return;
  }

  const item = JSON.parse(classVal);
  const fullClassName = getRealClassName(); 
  let dateStr = dateInput && dateInput.value ? dateInput.value : new Date().toISOString().split('T')[0];
  
  const isHR = (item[0].toUpperCase() === 'HR' || item[1].includes('โฮมรูม'));
  const isClub = String(item[0]).indexOf('CLUB_') === 0;
  const clubId = isClub ? String(item[0]).substring(5) : null;

  document.getElementById('classInfoCard')?.classList.remove('d-none');
  if(document.getElementById('dispClass')) document.getElementById('dispClass').innerText = isClub
    ? `กำลังดึงรายชื่อสมาชิกชุมนุม: ${item[1]}`
    : `กำลังดึงรายชื่อห้อง: ${fullClassName}`;

  const topicInput = document.getElementById('inputTopic');
  if(topicInput) {
      if (isHR && !topicInput.value) {
          topicInput.value = "กิจกรรมโฮมรูมและตรวจความเรียบร้อย";
      } else if (!isHR && topicInput.value === "กิจกรรมโฮมรูมและตรวจความเรียบร้อย") {
          topicInput.value = ""; 
      }
  }

  showLoader(true);
  const cacheKey = isClub ? `v5_stdlist_CLUB_${clubId}` : `v5_stdlist_${fullClassName}`;

  const fetchHistoryAndRender = (studentsData) => {
      if (isHR) {
          google.script.run
          .withFailureHandler(err => { showLoader(false); renderMorningTable(studentsData, {}); })
          .withSuccessHandler(function(historyData) {
              showLoader(false);
              renderMorningTable(studentsData, historyData || {});
              document.getElementById('studentListSection')?.classList.remove('d-none');
              
              if(btn) {
                  btn.disabled = false;
                  if(historyData && Object.keys(historyData).length > 0) {
                      btn.innerHTML = '<i class="fas fa-edit me-1"></i> อัปเดตข้อมูลโฮมรูม (ย้อนหลัง)';
                      btn.className = "btn btn-warning text-dark w-100 mt-4 py-3 fw-bold shadow-sm";
                  } else {
                      btn.innerHTML = '<i class="fas fa-sun me-1"></i> บันทึกข้อมูลโฮมรูม';
                      btn.className = "btn btn-primary w-100 mt-4 py-3 fw-bold shadow-sm";
                  }
                  let detailBtn = document.getElementById('btnDetailedSubmit');
                  if(detailBtn) detailBtn.classList.add('d-none');
              }
              setTimeout(setupSignatureCanvas, 200);
          }).getMorningActivityData(dateStr, fullClassName);
      } else {
          google.script.run
          .withFailureHandler(err => { showLoader(false); renderAttendanceTable(studentsData, {}); })
          .withSuccessHandler(function(historyArray) {
              showLoader(false);
              const historyMap = {};
              if (historyArray) { historyArray.forEach(h => { historyMap[h.cleanId] = h.status; historyMap[String(h.studentId).trim()] = h.status; }); }
              renderAttendanceTable(studentsData, historyMap);
              document.getElementById('studentListSection')?.classList.remove('d-none');
              
              if(btn) {
                  btn.disabled = false;
                  if(Object.keys(historyMap).length > 0) {
                      btn.innerHTML = '<i class="fas fa-edit me-1"></i> อัปเดตข้อมูลการสอน (ย้อนหลัง)';
                      btn.className = "btn btn-warning w-100 mt-4 py-3 fw-bold shadow-sm";
                  } else {
                      btn.innerHTML = '<i class="fas fa-save me-1"></i> บันทึกข้อมูลการสอน';
                      btn.className = "btn btn-primary w-100 mt-4 py-3 fw-bold shadow-sm";
                  }
                  let detailBtn = document.getElementById('btnDetailedSubmit');
                  if(!detailBtn) btn.insertAdjacentHTML('afterend', '<button id="btnDetailedSubmit" class="btn btn-outline-success w-100 py-2 mt-2 fw-bold" onclick="openDetailedLessonModal()"><i class="fas fa-clipboard-list me-2"></i>จบบทเรียน: บันทึกหลังสอนแบบละเอียด (DPA/3R8C)</button>');
                  else detailBtn.classList.remove('d-none');
              }
              setTimeout(setupSignatureCanvas, 200);
          }).getTodayAttendanceHistory(dateStr, item[0], fullClassName);
      }
  };

  let cached = null;
  try { cached = JSON.parse(sessionStorage.getItem(cacheKey) || 'null'); } catch(e){}
  if (!forceRefresh && cached && cached.length > 0) {
      currentStudents = cached;
      fetchHistoryAndRender(currentStudents);
  } else {
      const runner = google.script.run
        .withFailureHandler(err => { showLoader(false); showAlert("Error: " + err.message); })
        .withSuccessHandler(function(students) {
            currentStudents = students;
            if(!students || students.length === 0) {
                showLoader(false);
                const label = isClub ? `ชุมนุม "${item[1]}"` : `ห้อง ${fullClassName}`;
                document.getElementById('studentRows').innerHTML = `<tr><td colspan="5" class="text-center p-4 text-danger">ไม่พบรายชื่อนักเรียน${label}</td></tr>`;
                if(btn) btn.disabled = true; return;
            }
            try { sessionStorage.setItem(cacheKey, JSON.stringify(students)); } catch(e){}
            fetchHistoryAndRender(students);
        });
      if (isClub) runner.getStudentsByClub(clubId);
      else runner.getStudentsByClass(fullClassName);
  }
}

function renderAttendanceTable(students, historyMap = {}) {
  try {
      const tbody = document.getElementById('studentRows');
      if (!tbody) return;
      
      const table = tbody.closest('table');
      if (table) {
          let thead = table.querySelector('thead');
          if (thead) {
              thead.innerHTML = `
                  <tr class="table-primary text-center">
                      <th style="width: 50px;">ที่</th>
                      <th class="text-start">ชื่อ-สกุล</th>
                      <th>สถานะการเข้าเรียน</th>
                  </tr>
              `;
          }
      }

      let html = '';
      
      // 🌟 เรียงรหัสนักเรียนแบบตัวเลขอย่างชาญฉลาด
      students.sort((a, b) => String(a[0] || "").localeCompare(String(b[0] || ""), 'th', {numeric: true}));
      
      students.forEach((s, index) => {
        const rawId = String(s[0]).trim();    
        const cleanId = String(parseInt(rawId, 10)); 
        const stdName = s[2];
        
        let currentStatus = "มา"; let isMatched = false;
        if (historyMap[cleanId]) { currentStatus = historyMap[cleanId]; isMatched = true; } 
        else if (historyMap[rawId]) { currentStatus = historyMap[rawId]; isMatched = true; }
        
        html += `<tr><td class="text-center fw-bold text-muted">${index + 1}</td><td><div class="fw-bold">${stdName}</div><div class="small text-muted">ID: ${rawId} ${isMatched ? '<i class="fas fa-check-circle text-success ms-1"></i>' : ''}</div></td><td><div class="btn-group w-100" role="group"><input type="radio" class="btn-check" name="status_${rawId}" id="present_${rawId}" value="มา" ${currentStatus === 'มา' ? 'checked' : ''} onchange="updateSummary()"><label class="btn btn-outline-success btn-sm" for="present_${rawId}">มา</label><input type="radio" class="btn-check" name="status_${rawId}" id="late_${rawId}" value="สาย" ${currentStatus === 'สาย' ? 'checked' : ''} onchange="updateSummary()"><label class="btn btn-outline-warning btn-sm" for="late_${rawId}">สาย</label><input type="radio" class="btn-check" name="status_${rawId}" id="leave_${rawId}" value="ลา" ${currentStatus === 'ลา' || currentStatus === 'leave' ? 'checked' : ''} onchange="updateSummary()"><label class="btn btn-outline-info btn-sm" for="leave_${rawId}">ลา</label><input type="radio" class="btn-check" name="status_${rawId}" id="absent_${rawId}" value="ขาด" ${currentStatus === 'ขาด' ? 'checked' : ''} onchange="updateSummary()"><label class="btn btn-outline-danger btn-sm" for="absent_${rawId}">ขาด</label></div></td></tr>`;
      });
      
      tbody.innerHTML = html;
      if (typeof updateSummary === "function") updateSummary();
      
  } catch(e) {
      console.error("Error in renderAttendanceTable:", e);
  }
}

function updateSummary() {
  const present = document.querySelectorAll('input[value="มา"]:checked').length;
  const late = document.querySelectorAll('input[value="สาย"]:checked').length;
  const leave = document.querySelectorAll('input[value="ลา"]:checked').length;
  const absent = document.querySelectorAll('input[value="ขาด"]:checked').length;

  if(document.getElementById('sumPresent')) document.getElementById('sumPresent').innerText = present;
  if(document.getElementById('sumAbsent')) document.getElementById('sumAbsent').innerText = absent;
  if(document.getElementById('sumOther')) document.getElementById('sumOther').innerText = late + leave;

  let absentNames = [], lateNames = [], leaveNames = [];
  document.querySelectorAll('#studentRows tr').forEach(tr => {
      const nameDiv = tr.querySelector('.fw-bold');
      if(!nameDiv) return;
      const name = nameDiv.innerText;
      if(tr.querySelector('input[value="ขาด"]:checked')) absentNames.push(name);
      if(tr.querySelector('input[value="สาย"]:checked')) lateNames.push(name);
      if(tr.querySelector('input[value="ลา"]:checked')) leaveNames.push(name);
  });

  const oldSummary = document.getElementById('attendanceSummaryAlert');
  if(oldSummary) oldSummary.remove();

  let summaryHtml = `<div id="attendanceSummaryAlert" class="alert alert-primary shadow-sm py-2 mb-3 border-start border-4 border-primary animate__animated animate__fadeIn">
      <div class="fw-bold mb-1" style="font-size:0.9rem;"><i class="fas fa-users me-1"></i> สรุปรายชื่อผู้ที่ไม่ได้เข้าเรียนปกติ:</div>`;
  if (absentNames.length === 0 && lateNames.length === 0 && leaveNames.length === 0) {
      summaryHtml += `<div class="text-success small fw-bold"><i class="fas fa-check-circle me-1"></i>มาครบทุกคน 🎉</div>`;
  } else {
      if(absentNames.length > 0) summaryHtml += `<div class="text-danger small mb-1"><b>ขาด (${absentNames.length}):</b> ${absentNames.join(', ')}</div>`;
      if(lateNames.length > 0) summaryHtml += `<div class="text-warning text-dark small mb-1"><b>สาย (${lateNames.length}):</b> ${lateNames.join(', ')}</div>`;
      if(leaveNames.length > 0) summaryHtml += `<div class="text-info text-dark small mb-1"><b>ลา (${leaveNames.length}):</b> ${leaveNames.join(', ')}</div>`;
  }
  summaryHtml += `</div>`;
  
  const tableContainer = document.getElementById('studentRows')?.closest('.table-responsive');
  if(tableContainer) tableContainer.insertAdjacentHTML('beforebegin', summaryHtml);
}

function renderMorningTable(students, historyData = {}) {
  const tbody = document.getElementById('studentRows');
  if (!tbody) return;

  const table = tbody.closest('table');
  if (table) {
    let thead = table.querySelector('thead');
    if (thead) {
      thead.innerHTML = `
        <tr class="table-success text-center">
          <th style="width:50px;">ที่</th>
          <th class="text-start">ชื่อ-สกุล</th>
          <th style="min-width:130px;">เขตพื้นที่</th>
          <th style="min-width:130px;">เวรห้องเรียน</th>
          <th style="min-width:130px;">หน้าเสาธง</th>
        </tr>`;
    }
  }

  students.sort((a, b) => String(a[0] || "").localeCompare(String(b[0] || ""), 'th', {numeric: true}));

  const radioBtn = (name, val, label, checked, color) =>
    `<label class="btn btn-sm btn-outline-${color} py-1 px-2 ${checked ? 'active' : ''}" style="font-size:0.75rem;">
       <input type="radio" name="${name}" value="${val}" ${checked ? 'checked' : ''} autocomplete="off"> ${label}
     </label>`;

  let html = '';
  students.forEach((s, idx) => {
    const stdId = String(s[0]).trim();
    const hist = historyData[stdId] || {};
    const area = hist.area || 'ปกติ';
    const duty = hist.duty || 'ทำหน้าที่';
    const flag = hist.flag || 'เข้าแถว';

    html += `<tr>
      <td class="text-center text-muted small">${idx + 1}</td>
      <td><div class="fw-bold" style="font-size:0.85rem;">${s[2]}</div><div class="text-muted" style="font-size:0.75rem;">${stdId}</div></td>
      <td class="text-center">
        <div class="btn-group btn-group-sm" role="group">
          ${radioBtn(`area_${stdId}`, 'ปกติ', 'ปกติ', area === 'ปกติ', 'success')}
          ${radioBtn(`area_${stdId}`, 'ไม่ปกติ', 'ไม่ปกติ', area === 'ไม่ปกติ', 'warning')}
        </div>
      </td>
      <td class="text-center">
        <div class="btn-group btn-group-sm" role="group">
          ${radioBtn(`duty_${stdId}`, 'ทำหน้าที่', 'ทำ', duty === 'ทำหน้าที่', 'success')}
          ${radioBtn(`duty_${stdId}`, 'ไม่ทำหน้าที่', 'ไม่ทำ', duty === 'ไม่ทำหน้าที่', 'warning')}
        </div>
      </td>
      <td class="text-center">
        <div class="btn-group btn-group-sm" role="group">
          ${radioBtn(`flag_${stdId}`, 'เข้าแถว', 'เข้า', flag === 'เข้าแถว', 'success')}
          ${radioBtn(`flag_${stdId}`, 'ไม่เข้าแถว', 'ไม่เข้า', flag === 'ไม่เข้าแถว', 'danger')}
        </div>
      </td>
    </tr>`;
  });

  tbody.innerHTML = html;

  const summaryEl = document.getElementById('attendanceSummary');
  if (summaryEl) summaryEl.remove();

  document.getElementById('studentListSection')?.classList.remove('d-none');
}

// ==========================================
// 6. ฟังก์ชันบันทึกกิจกรรมยามเช้า (จากหน้าหลัก)
// ==========================================
function submitMorningCheckAcademic() {
  const classVal = document.getElementById('selectClass').value;
  const item = JSON.parse(classVal);
  const dateInput = document.getElementById('teachingDate');
  const user = getSessionUser();
  
  const now = new Date();
  const localDateStr = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
  let dateStr = dateInput && dateInput.value ? dateInput.value : localDateStr;
  const className = getRealClassName();
  
  const sigData = getCompressedSignature();
  if(sigData.length < 1000) { showAlert("กรุณาลงลายเซ็นครูที่ปรึกษาก่อนบันทึกครับ"); return; }

  const records = [];
  currentStudents.forEach(s => {
    const stdId = String(s[0]).trim();
    records.push({
      studentId: stdId,
      studentName: s[2],
      area: document.querySelector(`#studentRows input[name="area_${stdId}"]:checked`).value,
      duty: document.querySelector(`#studentRows input[name="duty_${stdId}"]:checked`).value,
      flag: document.querySelector(`#studentRows input[name="flag_${stdId}"]:checked`).value
    });
  });

  const payload = {
    date: dateStr, term: user.currentTerm, year: user.currentYear,
    className: className, teacherId: user.id, records: records
  };

  const btn = document.getElementById('btnSubmitAll');
  const oldText = btn.innerHTML;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก...';
  btn.disabled = true;
  showLoader(true);

  safeRun(3)
    .withSuccessHandler(res => {
      showLoader(false);
      btn.innerHTML = oldText;
      btn.disabled = false;
      showAlert(res.message);
      sessionStorage.clear();
      loadStudentList(true);
      clearSignature();
    })
    .withFailureHandler(err => {
      showLoader(false);
      btn.innerHTML = oldText;
      btn.disabled = false;
      showAlert("❌ เกิดข้อผิดพลาด: " + err.message);
    })
    .saveMorningActivityBatch(payload);
}

function getSessionUser() { try { return JSON.parse(localStorage.getItem('pssms_user') || 'null'); } catch(e) { return null; } }

function viewTodayHistory() {
  const classVal = document.getElementById('selectClass').value;
  const dateInput = document.getElementById('teachingDate'); 
  if(!classVal) { showAlert("กรุณาเลือกวิชาที่สอนก่อนครับ"); return; }
  
  const item = JSON.parse(classVal);
  const subjectCode = item[0];
  const className = getRealClassName(); 
  let dateStr = dateInput && dateInput.value ? dateInput.value : new Date().toISOString().split('T')[0];

  showLoader(true);
  google.script.run.withSuccessHandler(function(history) {
    showLoader(false);
    if (!history || history.length === 0) { showAlert("วันที่เลือกยังไม่มีการบันทึกข้อมูลครับ"); return; }
    tempHistoryData = history;
    renderHistoryModal(subjectCode);
  }).getTodayAttendanceHistory(dateStr, subjectCode, className);
}

function viewAllHistory() {
  const classVal = document.getElementById('selectClass').value;
  if(!classVal) { showAlert("กรุณาเลือกวิชาที่สอนก่อนครับ"); return; }
  
  const item = JSON.parse(classVal);
  const subjectCode = item[0];
  const className = getRealClassName(); 

  showLoader(true);
  google.script.run.withSuccessHandler(function(sessions) {
    showLoader(false);
    renderSessionListModal(sessions, subjectCode, className);
  }).getCourseSessionList(subjectCode, className);
}

function renderSessionListModal(sessions, subjectCode, className) {
  let html = '';
  if (sessions.length === 0) {
    html = '<div class="text-center p-4 text-muted">ยังไม่มีประวัติการสอนในวิชานี้</div>';
  } else {
    html = '<div class="list-group list-group-flush">';
    sessions.forEach(s => {
      html += `<button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3" onclick="loadHistoryForEdit('${s.date}')"><div><div class="fw-bold text-primary"><i class="fas fa-calendar-alt me-2"></i>${s.displayDate}</div><div class="small text-muted">คาบที่ ${s.period}</div></div><span class="badge bg-light text-dark border rounded-pill">บันทึกแล้ว ${s.count} คน <i class="fas fa-chevron-right ms-2 text-secondary"></i></span></button>`;
    });
    html += '</div>';
  }

function setupSignatureCanvas() {
  const wrapper = document.querySelector('.signature-wrapper');
  if (!wrapper) return;

  wrapper.innerHTML = '<canvas id="sig-canvas" width="450" height="150" style="touch-action: none; width: 100%; height: 100%; cursor: crosshair;"></canvas>';

  sigCanvas = document.getElementById('sig-canvas');
  sigCtx = sigCanvas.getContext('2d');
  
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  sigCtx.strokeStyle = '#000000';
  
  isDrawing = false;

  const getPos = (e) => {
    const rect = sigCanvas.getBoundingClientRect();
    let clientX = e.clientX;
    let clientY = e.clientY;
    
    if (e.touches && e.touches.length > 0) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
      clientX = e.changedTouches[0].clientX;
      clientY = e.changedTouches[0].clientY;
    }
    
    const scaleX = sigCanvas.width / rect.width;
    const scaleY = sigCanvas.height / rect.height;
    
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  };

  const startDraw = (e) => {
    if (e.cancelable) e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    sigCtx.beginPath();
    sigCtx.moveTo(pos.x, pos.y);
  };

  const doDraw = (e) => {
    if (e.cancelable) e.preventDefault();
    if (!isDrawing) return;
    const pos = getPos(e);
    sigCtx.lineTo(pos.x, pos.y);
    sigCtx.stroke();
  };

  const stopDraw = (e) => {
    if (e && e.cancelable) e.preventDefault();
    isDrawing = false;
    sigCtx.beginPath();
  };

  sigCanvas.addEventListener('mousedown', startDraw);
  sigCanvas.addEventListener('mousemove', doDraw);
  sigCanvas.addEventListener('mouseup', stopDraw);
  sigCanvas.addEventListener('mouseout', stopDraw);

  sigCanvas.addEventListener('touchstart', startDraw, { passive: false });
  sigCanvas.addEventListener('touchmove', doDraw, { passive: false });
  sigCanvas.addEventListener('touchend', stopDraw, { passive: false });
  sigCanvas.addEventListener('touchcancel', stopDraw, { passive: false });
}

function clearSignature() {
  if (sigCtx && sigCanvas) {
    sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
    sigCtx.beginPath();
  }
}

function getCompressedSignature() {
  if (!sigCanvas) return "";

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = sigCanvas.width;
  tempCanvas.height = sigCanvas.height;
  const ctx = tempCanvas.getContext('2d');

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
  ctx.drawImage(sigCanvas, 0, 0);
  
  return tempCanvas.toDataURL('image/jpeg', 0.5);
}

function getBase64(file) {
  return new Promise((resolve, reject) => {
    if(!file) { resolve(null); return; }
    const reader = new FileReader(); reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
  });
}

function confirmAddSingleSession() {
    const dateStr = document.getElementById('as_single_date').value;
    const periodStr = document.getElementById('as_single_period').value;
    
    if(!dateStr || !periodStr) { showAlert("กรุณากรอกข้อมูลให้ครบถ้วนครับ"); return; }
    
    if (massiveGridData.sessions.some(s => s.date === dateStr && s.period === periodStr)) {
        { showAlert("⚠️ คาบเรียนนี้มีแสดงอยู่ในตารางแล้วครับ!"); return; }
    }
    
    massiveGridData.sessions.push({ date: dateStr, period: periodStr, displayDate: dateStr });
    massiveGridData.sessions.sort((a, b) => a.date.localeCompare(b.date) || parseInt(a.period) - parseInt(b.period));
    renderMassiveGridModal();
    bootstrap.Modal.getInstance(document.getElementById('addSessionModal')).hide();
}

function confirmAddAutoSessions() {
    const dayOfWeek = parseInt(document.getElementById('as_auto_day').value);
    const period = document.getElementById('as_auto_period').value;
    const startStr = document.getElementById('as_auto_start').value;
    const endStr = document.getElementById('as_auto_end').value;

    if(!period || !startStr || !endStr) { showAlert("กรุณากรอกข้อมูลให้ครบถ้วนครับ"); return; }

    const startDate = new Date(startStr);
    const endDate = new Date(endStr);
    let currentDate = new Date(startDate);
    let addedCount = 0;

    while (currentDate <= endDate) {
        if (currentDate.getDay() === dayOfWeek) {
            const localDate = new Date(currentDate.getTime() - (currentDate.getTimezoneOffset() * 60000));
            const dStr = localDate.toISOString().split('T')[0];
            
            if (!massiveGridData.sessions.some(s => s.date === dStr && s.period === period)) {
                massiveGridData.sessions.push({ date: dStr, period: period, displayDate: dStr });
                addedCount++;
            }
        }
        currentDate.setDate(currentDate.getDate() + 1);
    }

    if(addedCount > 0) {
        massiveGridData.sessions.sort((a, b) => a.date.localeCompare(b.date) || parseInt(a.period) - parseInt(b.period));
        renderMassiveGridModal();
        bootstrap.Modal.getInstance(document.getElementById('addSessionModal')).hide();
        showAlert(`✅ ดึงคาบเรียนอัตโนมัติสำเร็จ ได้คอลัมน์เพิ่มมา ${addedCount} คาบครับ!`);
    } else {
        showAlert("⚠️ ไม่พบวันที่ตรงกับเงื่อนไข หรือคาบเรียนเหล่านี้มีอยู่แล้วในตารางครับ");
    }
}

function saveMassiveGrid() {
    const updates = [];
    const newRecords = [];
    const user = getSessionUser();
    
    massiveGridData.sessions.forEach(sess => {
        const sessionKey = sess.date + '_' + sess.period;
        massiveGridData.students.forEach(std => {
            const stdId = String(std[0]).trim();
            const cleanStdId = String(parseInt(stdId, 10));
            const select = document.getElementById(`mass_${cleanStdId}_${sessionKey}`);
            if (!select) return;
            
            const status = select.value;
            if (status === '-') return; 
            
            const rowIdx = select.getAttribute('data-rowidx');
            const isNew = select.getAttribute('data-isnew') === 'true';
            
            if (!isNew && rowIdx) {
                const origAtt = massiveGridData.attendance[cleanStdId] && massiveGridData.attendance[cleanStdId][sessionKey];
                if (origAtt && origAtt.status !== status) {
                    updates.push({ rowIdx: parseInt(rowIdx), status: status });
                }
            } else if (isNew) {
                newRecords.push({
                    date: sess.date, period: sess.period, studentId: stdId, studentName: std[2], status: status
                });
            }
        });
    });
    
    if (updates.length === 0 && newRecords.length === 0) return showAlert("ยังไม่มีการเปลี่ยนแปลงข้อมูลครับ (ช่องสีเทา '-' จะไม่ถูกบันทึก)");
    Swal.fire({
        title: 'ยืนยันการบันทึกข้อมูล?',
        html: `อัปเดตข้อมูลเดิม: <b>${updates.length}</b> รายการ<br>เพิ่มเช็คชื่อคาบใหม่: <b>${newRecords.length}</b> รายการ`,
        icon: 'question', showCancelButton: true, confirmButtonText: 'บันทึก', cancelButtonText: 'ยกเลิก'
    }).then(r => {
        if (!r.isConfirmed) return;
        const btn = document.querySelector('#massiveGridModal .btn-success');
        const oldText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังประมวลผล...';
        btn.disabled = true;
        safeRun(3).withFailureHandler(err => {
            btn.innerHTML = oldText; btn.disabled = false;
            showAlert("❌ เกิดข้อผิดพลาด: " + err.message);
        }).withSuccessHandler(res => {
            btn.innerHTML = oldText; btn.disabled = false;
            if (res.status === 'success') {
                showAlert("✅ " + res.message);
                const modalEl = document.getElementById('massiveGridModal');
                const modalObj = bootstrap.Modal.getInstance(modalEl);
                if (modalObj) modalObj.hide();
                setTimeout(() => {
                    if (modalEl) modalEl.remove();
                    document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
                    document.body.classList.remove('modal-open');
                    document.body.style.overflow = '';
                    document.body.style.paddingRight = '';
                    sessionStorage.removeItem(`risk_dash_${user.id}_${user.currentTerm}_${user.currentYear}`);
                    loadStudentList(true);
                }, 400);
            } else {
                showAlert("❌ เกิดข้อผิดพลาด: " + res.message);
            }
        }).saveMassiveAttendanceGrid(
            massiveGridData.subjectCode, massiveGridData.subjectName, massiveGridData.className,
            user.currentTerm, user.currentYear, updates, newRecords, user.id
        );
    });
}

function loadStudentSummary() {
  var cached = _dashCacheGet('admin_student_summary');
  if (cached) {
    renderStudentTable(cached);
    renderStudentChart(cached);
  } else {
    var tbody = document.getElementById('summaryTableBody');
    if (tbody) tbody.innerHTML = _skelRows(6, ['35%','15%','15%','15%']);
  }
  google.script.run.withSuccessHandler(function(data) {
    if (!data || !data.length) return;
    _dashCacheSet('admin_student_summary', data);
    renderStudentTable(data);
    renderStudentChart(data);
  }).getStudentSummaryStats();
}

function renderStudentTable(data) {
  const tbody = document.getElementById('summaryTableBody');
  const tfooter = document.getElementById('tableFooter');
  if(!tbody) return;
  let html = ''; let sumM = 0, sumF = 0, sumT = 0;
  data.forEach(item => {
    sumM += item.male; sumF += item.female; sumT += item.total;
    html += `<tr><td><span class="badge bg-light text-dark border">${item.grade}</span></td><td class="text-center text-primary">${item.male}</td><td class="text-center text-danger">${item.female}</td><td class="text-center fw-bold">${item.total}</td></tr>`;
  });
  tbody.innerHTML = html;
  if(tfooter) tfooter.innerHTML = `<tr><td>รวมทั้งหมด</td><td class="text-center text-primary">${sumM}</td><td class="text-center text-danger">${sumF}</td><td class="text-center bg-primary text-white">${sumT}</td></tr>`;
}

function renderStudentChart(data) {
  const canvas = document.getElementById('studentChart');
  if(!canvas) return;
  if (window.myChart) window.myChart.destroy();
  window.myChart = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: data.map(i => i.grade),
      datasets: [{ label: 'ชาย', data: data.map(i => i.male), backgroundColor: '#3498db' }, { label: 'หญิง', data: data.map(i => i.female), backgroundColor: '#e74c3c' }]
    },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });
}

function initAcademicReportPage() {
  // ดึงค่าเทอมและปีปัจจุบันของครูมาใส่ในช่อง
  const user = getSessionUser();
  if(user) {
    const termEl = document.getElementById('reportTerm');
    const yearEl = document.getElementById('reportYear');
    if(termEl) termEl.value = user.currentTerm;
    if(yearEl) yearEl.value = user.currentYear;
  }
  reloadReportSubjects(); 
}

function reloadReportSubjects() {
  const termEl = document.getElementById('reportTerm');
  const yearEl = document.getElementById('reportYear');
  const select = document.getElementById('reportClassSelect');
  if(!termEl || !yearEl || !select) return;
  
  const term = termEl.value; 
  const year = yearEl.value; 
  const user = getSessionUser();

  select.innerHTML = `<option value="">⏳ กำลังโหลดวิชา...</option>`; 
  select.disabled = true;
  
  const tbody = document.getElementById('reportTableBody'); 
  if(tbody) tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-muted">กรุณาเลือกวิชา</td></tr>';
  
  const summaryDiv = document.getElementById('reportSummaryInfo'); 
  if(summaryDiv) summaryDiv.remove();

  const subjectCacheKey = `report_subjects_${user.id}_${term}_${year}`;
  const cachedSubjects = sessionStorage.getItem(subjectCacheKey);
  
  if (cachedSubjects) { 
      buildReportSubjectDropdown(JSON.parse(cachedSubjects), term, year); 
      return; 
  }

  google.script.run
    .withFailureHandler(err => { 
        select.innerHTML = '<option value="">❌ เกิดข้อผิดพลาด</option>'; 
        select.disabled = false; 
        showAlert("ไม่สามารถดึงรายวิชาได้: " + err.message); 
    })
    .withSuccessHandler(subjects => { 
        sessionStorage.setItem(subjectCacheKey, JSON.stringify(subjects)); 
        buildReportSubjectDropdown(subjects, term, year); 
    })
    .getTeacherSubjects(user.id, user.role, term, year);
}

  if(!subjects || subjects.length === 0) { 
      select.innerHTML = `<option value="">⚠️ ไม่พบวิชาในเทอม ${term}/${year}</option>`; 
      return; 
  }
  
  let html = '<option value="">-- เลือกรายวิชา --</option><option value="ALL" class="fw-bold text-white bg-primary">ดูทุกรายวิชาที่สอน (รวมทั้งหมด)</option>';
  subjects.forEach(sub => { 
      html += `<option value='${JSON.stringify(sub)}'>${sub[0]} - ${sub[3]} (${sub[1]})</option>`; 
  });
  select.innerHTML = html;
}

function generateReport() {
  const val = document.getElementById('reportClassSelect').value;
  if(!val) { showAlert("กรุณาเลือกรายวิชาก่อนครับ"); return; }
  
  const term = document.getElementById('reportTerm').value; 
  const year = document.getElementById('reportYear').value; 
  const user = getSessionUser();
  showLoader(true);

  if (val === "ALL") {
    google.script.run
      .withFailureHandler(err => { showLoader(false); showAlert("Error: " + err.message); })
      .withSuccessHandler(function(res) { 
          try { renderAllSubjectsReportTable(res); } 
          catch (e) { showLoader(false); console.error(e); } 
      })
      .getAllSubjectsReport(user.id, term, year);
  } else {
    try {
      const item = JSON.parse(val); 
      google.script.run
        .withFailureHandler(err => { showLoader(false); showAlert("Error: " + err.message); })
        .withSuccessHandler(function(res) { 
            try { renderReportTable(res, item[0], item[1], item[2]); } 
            catch (e) { showLoader(false); console.error(e); } 
        })
        .getSemesterReport(item[0], item[2], term, year);
    } catch (e) { 
        showLoader(false); 
        showAlert("ข้อมูลรายวิชาไม่ถูกต้อง: " + e.message); 
    }
  }
}

function renderReportTable(res, subjectCode, subjectName, className) {
  showLoader(false);
  const tbody = document.getElementById('reportTableBody'); 
  if (!tbody) return;
  tbody.innerHTML = '';
  
  const oldHeader = document.getElementById('reportSummaryInfo'); 
  if(oldHeader) oldHeader.remove();

  if(!res || !res.students || res.students.length === 0) { 
      tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-muted">ไม่พบข้อมูลการเช็คชื่อในรายวิชานี้</td></tr>'; 
      return; 
  }

  const data = res.students; 
  const meta = res.meta || { periodsPerWeek: 0, totalCoursePeriods: 0, maxAbsenceQuota: 0, currentTotalTaught: 0 }; 
  const taught = meta.currentTotalTaught; 
  const total = meta.totalCoursePeriods; 
  const progressPercent = total > 0 ? Math.min((taught / total) * 100, 100).toFixed(1) : 0; 
  const remaining = total - taught;
  
  const critical = []; const ms = []; const risk = [];
  data.forEach(s => { 
      const p = parseFloat(s.percent); 
      if (p < 60) critical.push(s); 
      else if (p < 80) ms.push(s); 
      else if (p <= 85) risk.push(s); 
  });

  const renderList = (arr, colorClass) => {
    if(arr.length === 0) return `<div class="text-center text-muted small py-3">ไม่มีนักเรียนในกลุ่มนี้ 🎉</div>`;
    return arr.map(s => `<div class="d-flex justify-content-between align-items-center border-bottom py-2"><div><div class="fw-bold text-dark" style="font-size: 0.85rem;">${s.id} ${s.name}</div><div class="text-muted" style="font-size: 0.75rem;">มา <span class="text-success fw-bold">${s.present + s.late}</span>/${taught} คาบ (ขาด <span class="text-danger">${s.absent}</span>, ลา <span class="text-info">${s.leave}</span>)</div></div><span class="badge bg-${colorClass} rounded-pill" style="font-size: 0.8rem;">${s.percent}%</span></div>`).join('');
  };

  let infoHtml = `<div id="reportSummaryInfo" class="mb-4 animate__animated animate__fadeIn"><div class="card border-0 shadow-sm mb-4" style="background: linear-gradient(to right, #ffffff, #f8f9fa);"><div class="card-body"><div class="d-flex justify-content-between align-items-center mb-2"><h6 class="fw-bold text-primary m-0"><i class="fas fa-clock me-2"></i>ความคืบหน้า: ${subjectCode} ${subjectName} (${className})</h6><span class="badge bg-light text-dark border">สอนแล้ว ${taught} / ${total} คาบ</span></div><div class="progress" style="height: 15px; border-radius: 10px; background-color: #e9ecef;"><div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: ${progressPercent}%">${progressPercent}%</div></div><div class="d-flex justify-content-between mt-2" style="font-size: 0.8rem;"><span class="text-secondary"><i class="fas fa-info-circle me-1"></i>เกณฑ์: ขาดได้สูงสุด <b>${meta.maxAbsenceQuota}</b> ครั้ง (20%)</span><span class="text-success fw-bold">เหลืออีก ${remaining > 0 ? remaining : 0} คาบ</span></div></div></div><h6 class="fw-bold text-danger mb-3"><i class="fas fa-exclamation-triangle me-2"></i>กระดานแจ้งเตือนรายบุคคล</h6><div class="row g-3 mb-4"><div class="col-md-4"><div class="card border-info shadow-sm h-100"><div class="card-header bg-info text-dark fw-bold small d-flex justify-content-between"><span>กลุ่มเสี่ยง (80-85%)</span><span class="badge bg-white text-dark">${risk.length}</span></div><div class="card-body p-2" style="max-height: 250px; overflow-y: auto;">${renderList(risk, 'info text-dark')}</div></div></div><div class="col-md-4"><div class="card border-warning shadow-sm h-100"><div class="card-header bg-warning text-dark fw-bold small d-flex justify-content-between"><span>ติด มส. (60-79%)</span><span class="badge bg-white text-dark">${ms.length}</span></div><div class="card-body p-2" style="max-height: 250px; overflow-y: auto;">${renderList(ms, 'warning text-dark')}</div></div></div><div class="col-md-4"><div class="card border-danger shadow-sm h-100"><div class="card-header bg-danger text-white fw-bold small d-flex justify-content-between"><span>หมดสิทธิ์ (< 60%)</span><span class="badge bg-white text-danger">${critical.length}</span></div><div class="card-body p-2" style="max-height: 250px; overflow-y: auto;">${renderList(critical, 'danger')}</div></div></div></div></div>`;
  const tableEl = document.querySelector('table');
  if(tableEl) { 
      tableEl.insertAdjacentHTML('beforebegin', infoHtml); 
      const theads = tableEl.querySelectorAll('th'); 
      if (theads.length >= 3) { theads[1].innerText = "รหัสนักเรียน"; theads[2].innerText = "ชื่อ-สกุล"; } 
  }

  let html = '';
  
  // เรียงรหัสแบบตัวเลข
  data.sort((a, b) => String(a.id || "").localeCompare(String(b.id || ""), 'th', {numeric: true}));
  
  data.forEach((s, index) => {
    const p = parseFloat(s.percent); 
    const totalMissed = (s.leave || 0) + (s.absent || 0); 
    const remainingQuota = meta.maxAbsenceQuota - totalMissed;
    
    let statusBadge = ''; let rowClass = ''; let progressColor = ''; let quotaText = '';
    if (remainingQuota >= 0) quotaText = `<span class="text-muted small">ขาดได้อีก <b>${remainingQuota}</b> ครั้ง</span>`; 
    else quotaText = `<span class="text-danger fw-bold small">เกินโควตา <b>${Math.abs(remainingQuota)}</b> ครั้ง</span>`;
    
    if (p > 85) { statusBadge = '<span class="badge bg-success rounded-pill px-2">ปกติ</span>'; progressColor = 'bg-success'; } 
    else if (p >= 80) { statusBadge = '<span class="badge bg-info text-dark rounded-pill px-2">เฝ้าระวัง</span>'; progressColor = 'bg-info'; } 
    else if (p >= 60) { statusBadge = '<span class="badge bg-warning text-dark rounded-pill px-2">มส.</span>'; rowClass = 'table-warning'; progressColor = 'bg-warning'; } 
    else { statusBadge = '<span class="badge bg-danger rounded-pill px-2">หมดสิทธิ์</span>'; rowClass = 'table-danger'; progressColor = 'bg-danger'; }
    
    html += `<tr class="${rowClass}"><td class="text-center small">${index + 1}</td><td><div class="fw-bold text-primary small">${s.id}</div></td><td><div class="fw-bold small">${s.name}</div></td><td class="text-center"><span class="text-success fw-bold">${s.present}</span> <span class="text-muted">/</span> <span class="text-warning fw-bold">${s.late}</span></td><td class="text-center"><span class="text-info">${s.leave}</span> <span class="text-muted">/</span> <span class="text-danger fw-bold">${s.absent}</span><div class="mt-1">${quotaText}</div></td><td style="vertical-align: middle;"><div class="d-flex align-items-center"><div class="flex-grow-1 me-2"><div class="progress" style="height: 6px;"><div class="progress-bar ${progressColor}" style="width: ${p}%"></div></div></div><span class="fw-bold small ${p < 80 ? 'text-danger' : 'text-success'}">${p}%</span></div></td><td class="text-center">${statusBadge}</td></tr>`;
  });
  tbody.innerHTML = html;
}

function renderAllSubjectsReportTable(data) {
  showLoader(false);
  const tbody = document.getElementById('reportTableBody'); 
  if (!tbody) return;
  tbody.innerHTML = '';
  
  const oldHeader = document.getElementById('reportSummaryInfo'); 
  if(oldHeader) oldHeader.remove();
  
  if(!data || data.length === 0) { 
      tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-muted">ไม่พบข้อมูลการเช็คชื่อในเทอมนี้</td></tr>'; 
      return; 
  }

  const critical = []; const ms = []; const risk = [];
  data.forEach(s => { 
      const p = parseFloat(s.percent); 
      if (p < 60) critical.push(s); 
      else if (p < 80) ms.push(s); 
      else if (p <= 85) risk.push(s); 
  });
  
  const renderList = (arr, colorClass) => {
    if(arr.length === 0) return `<div class="text-center text-muted small py-3">ไม่มีนักเรียนในกลุ่มนี้ 🎉</div>`;
    return arr.map(s => `<div class="d-flex justify-content-between align-items-center border-bottom py-2"><div style="flex-grow:1; padding-right:10px;"><div class="fw-bold text-dark" style="font-size: 0.85rem;">${s.id} ${s.name}</div><div class="text-primary" style="font-size: 0.75rem;"><i class="fas fa-book me-1"></i>${s.subjectCode} (${s.className})</div></div><span class="badge bg-${colorClass} rounded-pill" style="font-size: 0.8rem;">${s.percent}%</span></div>`).join('');
  };

  let infoHtml = `<div id="reportSummaryInfo" class="mb-4 animate__animated animate__fadeIn"><div class="card border-0 shadow-sm mb-4 bg-primary text-white text-center py-3" style="border-radius: 10px;"><h5 class="fw-bold m-0"><i class="fas fa-layer-group me-2"></i>สรุปสถิติเวลาเรียนรวมทุกรายวิชา</h5><div class="small mt-1 opacity-75">จำนวนข้อมูลนักเรียนทั้งหมด: <b>${data.length}</b> รายการ (แยกตามกลุ่มรายวิชา)</div></div><h6 class="fw-bold text-danger mb-3"><i class="fas fa-exclamation-triangle me-2"></i>กระดานแจ้งเตือนรายบุคคล (รวมทุกวิชา)</h6><div class="row g-3 mb-4"><div class="col-md-4"><div class="card border-info shadow-sm h-100"><div class="card-header bg-info text-dark fw-bold small d-flex justify-content-between"><span>กลุ่มเสี่ยง (80-85%)</span><span class="badge bg-white text-dark">${risk.length}</span></div><div class="card-body p-2" style="max-height: 250px; overflow-y: auto;">${renderList(risk, 'info text-dark')}</div></div></div><div class="col-md-4"><div class="card border-warning shadow-sm h-100"><div class="card-header bg-warning text-dark fw-bold small d-flex justify-content-between"><span>ติด มส. (60-79%)</span><span class="badge bg-white text-dark">${ms.length}</span></div><div class="card-body p-2" style="max-height: 250px; overflow-y: auto;">${renderList(ms, 'warning text-dark')}</div></div></div><div class="col-md-4"><div class="card border-danger shadow-sm h-100"><div class="card-header bg-danger text-white fw-bold small d-flex justify-content-between"><span>หมดสิทธิ์ (< 60%)</span><span class="badge bg-white text-danger">${critical.length}</span></div><div class="card-body p-2" style="max-height: 250px; overflow-y: auto;">${renderList(critical, 'danger')}</div></div></div></div></div>`;
  const tableEl = document.querySelector('table');
  if(tableEl) { 
      tableEl.insertAdjacentHTML('beforebegin', infoHtml); 
      const theads = tableEl.querySelectorAll('th'); 
      if (theads.length >= 3) { theads[1].innerText = "รหัสนักเรียน"; theads[2].innerText = "ชื่อ-สกุล"; } 
  }

  let html = ''; let currentGroup = ''; let studentIndex = 1; 
  data.forEach((s) => {
    const p = parseFloat(s.percent); 
    const remainingQuota = s.remainingQuota; 
    const groupKey = `${s.subjectCode}_${s.className}`;
    
    if (groupKey !== currentGroup) {
      studentIndex = 1; 
      html += `<tr style="background-color: #e7f1ff; border-top: 2px solid #0d6efd; border-bottom: 2px solid #0d6efd;"><td colspan="7" class="fw-bold text-primary text-start py-3 ps-3"><i class="fas fa-book-open me-2 text-primary"></i> <span style="font-size: 1.05rem;">วิชา: ${s.subjectCode} ${s.subjectName}</span><span class="badge bg-primary rounded-pill ms-2" style="font-size:0.85rem;"><i class="fas fa-users me-1"></i>ห้อง ${s.className}</span><span class="badge bg-light text-dark border ms-2 shadow-sm">สอนไปแล้ว ${s.taught} คาบ</span></td></tr>`;
      currentGroup = groupKey;
    }
    
    let statusBadge = ''; let rowClass = ''; let progressColor = ''; let quotaText = '';
    if (remainingQuota >= 0) quotaText = `<span class="text-muted small">เหลือโควตา <b>${remainingQuota}</b></span>`; 
    else quotaText = `<span class="text-danger fw-bold small">เกิน <b>${Math.abs(remainingQuota)}</b></span>`;
    
    if (p > 85) { statusBadge = '<span class="badge bg-success rounded-pill px-2">ปกติ</span>'; progressColor = 'bg-success'; } 
    else if (p >= 80) { statusBadge = '<span class="badge bg-info text-dark rounded-pill px-2">เฝ้าระวัง</span>'; progressColor = 'bg-info'; } 
    else if (p >= 60) { statusBadge = '<span class="badge bg-warning text-dark rounded-pill px-2">มส.</span>'; rowClass = 'table-warning'; progressColor = 'bg-warning'; } 
    else { statusBadge = '<span class="badge bg-danger rounded-pill px-2">หมดสิทธิ์</span>'; rowClass = 'table-danger'; progressColor = 'bg-danger'; }
    
    html += `<tr class="${rowClass}"><td class="text-center small">${studentIndex++}</td><td><div class="fw-bold text-primary small">${s.id}</div></td><td><div class="fw-bold small">${s.name}</div></td><td class="text-center"><span class="text-success fw-bold">${s.present}</span> <span class="text-muted">/</span> <span class="text-warning fw-bold">${s.late}</span></td><td class="text-center"><span class="text-info">${s.leave}</span> <span class="text-muted">/</span> <span class="text-danger fw-bold">${s.absent}</span><div class="mt-1">${quotaText}</div></td><td style="vertical-align: middle;"><div class="d-flex align-items-center"><div class="flex-grow-1 me-2"><div class="progress" style="height: 6px;"><div class="progress-bar ${progressColor}" style="width: ${p}%"></div></div></div><span class="fw-bold small ${p < 80 ? 'text-danger' : 'text-success'}">${p}%</span></div></td><td class="text-center">${statusBadge}</td></tr>`;
  });
  
  tbody.innerHTML = html;
}

function openDetailedLessonModal() {
  var topic = document.getElementById('inputTopic').value;
  if(!topic) { showAlert('กรุณากรอก "หัวข้อที่สอน" ก่อนกดบันทึกแบบละเอียด'); document.getElementById('inputTopic').focus(); return; }
  if(sigCanvas && sigCanvas.toDataURL().length < 1000) { showAlert('กรุณาลงชื่อผู้สอนก่อน'); return; }
  document.getElementById('detailedLessonForm').reset();
  new bootstrap.Modal(document.getElementById('detailedLessonModal')).show();
}

async function submitDetailedLesson() {
  var classVal = document.getElementById('selectClass').value;
  if(!classVal) { showAlert('กรุณาเลือกวิชาก่อน'); return; }
  var item = JSON.parse(classVal);
  var topic = document.getElementById('inputTopic').value;
  var dateInput = document.getElementById('teachingDate');
  var user = getSessionUser();
  var date = (dateInput && dateInput.value) ? dateInput.value : new Date().toISOString().split('T')[0];
  var normalizedClassName = getRealClassName();

  var dpaValues = Array.from(document.querySelectorAll('.dpa-check:checked')).map(function(el){ return el.value; });
  var skillValues = Array.from(document.querySelectorAll('.skill-check:checked')).map(function(el){ return el.value; });
  var workFile = document.getElementById('dl_work_file').files[0];
  var imageFile = document.getElementById('dl_image_file').files[0];

  var submitBtn = document.querySelector('#detailedLessonModal .btn-primary');
  var originalBtnText = submitBtn.innerHTML;
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก...';
  showLoader(true);

  try {
    var workFileBase64 = await getBase64(workFile);
    var imageFileBase64 = await getBase64(imageFile);

    var detailedRecord = {
      date: date, subjectCode: item[0], subjectName: item[1], className: normalizedClassName, period: item[5], topic: topic, teacherId: user.id,
      outcomes: document.getElementById('dl_outcomes').value,
      problems: document.getElementById('dl_problems').value,
      solutions: document.getElementById('dl_solutions').value,
      dpa: dpaValues, skills: skillValues,
      studentResults: document.getElementById('dl_student_results').value,
      workFileBase64: workFileBase64, imageFileBase64: imageFileBase64
    };

    var attendanceBatch = currentStudents.map(function(s) {
      var statusEl = document.querySelector('input[name="status_' + s[0] + '"]:checked');
      return { date: date, term: user.currentTerm, year: user.currentYear, subjectCode: item[0], subjectName: item[1], className: normalizedClassName, period: item[5], studentId: s[0], studentName: s[2], status: statusEl ? statusEl.value : 'มา', teacherId: user.id };
    });

    var lateCount = document.querySelectorAll('input[value="สาย"]:checked').length;
    var leaveCount = document.querySelectorAll('input[value="ลา"]:checked').length;
    var basicRecord = {
      date: date, term: user.currentTerm, year: user.currentYear,
      subjectCode: item[0], subjectName: item[1], className: normalizedClassName, period: item[5], topic: topic,
      present: parseInt(document.getElementById('sumPresent').innerText) + lateCount,
      absent: parseInt(document.getElementById('sumAbsent').innerText) || 0, leave: leaveCount,
      teacherId: user.id, signature: sigCanvas ? sigCanvas.toDataURL() : ''
    };

    google.script.run.withSuccessHandler(function() {
      google.script.run.withSuccessHandler(function() {
        google.script.run.withSuccessHandler(function(res) {
          showLoader(false);
          bootstrap.Modal.getInstance(document.getElementById('detailedLessonModal')).hide();
          sessionStorage.removeItem('risk_dash_' + user.id + '_' + user.currentTerm + '_' + user.currentYear);
          sessionStorage.removeItem('lesson_history_' + user.id + '_' + user.currentTerm + '_' + user.currentYear);
          showAlert(res.message);
          loadPage('Page_Dashboard_Teacher');
        }).saveDetailedLessonRecord(detailedRecord);
      }).saveLessonRecord(basicRecord);
    }).saveAttendanceBatch(attendanceBatch);

  } catch(err) {
    showLoader(false); submitBtn.disabled = false; submitBtn.innerHTML = originalBtnText;
    showAlert('เกิดข้อผิดพลาด: ' + err.message);
  }
}

</script>
